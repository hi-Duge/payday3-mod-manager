# How to ship a release (version must match package.json):
#   1. Commit your changes on main (including version bump in package.json / patchnotes).
#   2. git tag v1.0.59
#   3. git push origin main
#   4. git push origin v1.0.59
# The tag push runs this workflow and uploads portable + NSIS to GitHub Releases.
#
# Or: GitHub repo -> Actions -> "Publish release" -> Run workflow (uses the branch
# you select; still uses package.json version for artifacts).

name: Publish release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
